name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: constraints-v020.txt
      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-v020.txt -e '.[dev]'
      - name: Run default tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q -p no:cacheprovider

  quality:
    name: Static and configuration gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: constraints-v020.txt
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-v020.txt -e '.[dev]'
      - name: Ruff format
        run: python -m ruff format --check src tests tools
      - name: Ruff check
        run: python -m ruff check --no-cache src tests tools
      - name: Strict mypy
        run: python -m mypy src tools/generate_v020_acceptance.py
      - name: Python compileall
        run: python -m compileall -q src tests tools
      - name: JavaScript syntax
        run: node --check src/linguaspindle/web/app.js
      - name: Compose configuration
        env:
          LINGUASPINDLE_OPENAI_API_KEY: ""
        run: docker compose --env-file /dev/null config

  browser:
    name: Chromium browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: constraints-v020.txt
      - name: Install project and browser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-v020.txt -e '.[dev]'
          python -m playwright install --with-deps chromium
      - name: Run Chromium suite
        env:
          LINGUASPINDLE_RUN_BROWSER_TESTS: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q -p no:cacheprovider -m browser

  package:
    name: Wheel and package resources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install isolated build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build>=1.2,<2'
      - name: Build Wheel
        run: python -m build --wheel
      - name: Verify Wheel version and runtime resources
        run: |
          python - <<'PY'
          from email.parser import Parser
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("linguaspindle-0.2.0-py3-none-any.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one v0.2.0 Wheel, found {len(wheels)}")

          required = {
              "linguaspindle/web/index.html",
              "linguaspindle/web/app.js",
              "linguaspindle/web/styles.css",
              "linguaspindle/migrations/0001_initial.sql",
              "linguaspindle/migrations/0002_epub.sql",
          }
          with ZipFile(wheels[0]) as archive:
              names = set(archive.namelist())
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f"missing package resources: {missing}")
              metadata_name = next(
                  name for name in names if name.endswith(".dist-info/METADATA")
              )
              metadata = Parser().parsestr(archive.read(metadata_name).decode("utf-8"))
              if metadata["Version"] != "0.2.0":
                  raise SystemExit(f"unexpected Wheel version: {metadata['Version']}")
          PY
