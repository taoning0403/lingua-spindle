name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: constraints-v031.txt
      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-v031.txt -e '.[dev]'
      - name: Run default tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python -m pytest -q -p no:cacheprovider
          --cov=linguaspindle --cov-branch --cov-report=term-missing

  windows-core:
    name: Windows core import
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install default package only
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install 'pytest>=8.3,<9'
          python -m pip check
      - name: Test the public core without optional product dependencies
        run: python -m pytest -q tests/core

  quality:
    name: Static and configuration gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: constraints-v031.txt
      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-v031.txt -e '.[dev]'
      - name: Ruff format
        run: python -m ruff format --check src tests tools
      - name: Ruff check
        run: python -m ruff check --no-cache src tests tools
      - name: Strict mypy
        run: >-
          python -m mypy src
          tools/generate_v020_acceptance.py
          tools/generate_v030_acceptance.py
          tools/verify_v030_extras.py
          tools/generate_v031_acceptance.py
          tools/verify_v031_extras.py
      - name: Python compileall
        run: python -m compileall -q src tests tools
      - name: Compose configuration
        env:
          LINGUASPINDLE_OPENAI_API_KEY: ""
        run: docker compose --env-file /dev/null config

  package:
    name: Wheel and package resources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install isolated build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'build>=1.2,<2'
      - name: Build Wheel
        run: python -m build --wheel
      - name: Verify default dependencies and package resources
        run: |
          python - <<'PY'
          from email.parser import Parser
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("linguaspindle-*-py3-none-any.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one Wheel, found {len(wheels)}")

          required = {
              "linguaspindle/migrations/0001_initial.sql",
              "linguaspindle/migrations/0002_epub.sql",
              "linguaspindle/migrations/0003_headless_core.sql",
              "linguaspindle/migrations/0004_service_idempotency.sql",
          }
          with ZipFile(wheels[0]) as archive:
              names = set(archive.namelist())
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f"missing package resources: {missing}")
              web_members = sorted(
                  name for name in names if name.startswith("linguaspindle/web/")
              )
              if web_members:
                  raise SystemExit(f"Wheel contains removed Web resources: {web_members}")
              metadata_name = next(
                  name for name in names if name.endswith(".dist-info/METADATA")
              )
              metadata = Parser().parsestr(archive.read(metadata_name).decode("utf-8"))
              base_requirements = [
                  value
                  for value in metadata.get_all("Requires-Dist", [])
                  if "extra ==" not in value
              ]
              if len(base_requirements) != 1 or not base_requirements[0].startswith(
                  "charset-normalizer"
              ):
                  raise SystemExit(
                      f"unexpected default dependencies: {base_requirements}"
                  )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: linguaspindle-wheel
          path: dist/*.whl
          if-no-files-found: error

  extras:
    name: Wheel extra - ${{ matrix.extra }}
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        extra:
          - core
          - openai
          - manga
          - runtime
          - cli
          - server
          - all
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linguaspindle-wheel
          path: wheel
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
      - name: Install Wheel in an isolated environment
        env:
          EXTRA: ${{ matrix.extra }}
        run: |
          python -m venv .extra-venv
          WHEEL=$(find wheel -name '*.whl' -print -quit)
          if [ "$EXTRA" = core ]; then
            SPEC="$WHEEL"
          else
            SPEC="$WHEEL[$EXTRA]"
          fi
          .extra-venv/bin/python -m pip install --upgrade pip
          .extra-venv/bin/python -m pip install "$SPEC"
          .extra-venv/bin/python -m pip check
      - name: Smoke-test installed extra
        env:
          EXTRA: ${{ matrix.extra }}
        run: |
          case "$EXTRA" in
            core)
              .extra-venv/bin/python -I -c 'import importlib.util, linguaspindle; optional = {"fastapi", "httpx", "platformdirs", "playwright", "sqlalchemy", "typer", "uvicorn"}; installed = sorted(name for name in optional if importlib.util.find_spec(name) is not None); assert not installed, f"core install pulled optional modules: {installed}"'
              ;;
            openai)
              .extra-venv/bin/python -I -c 'from linguaspindle.providers.openai_compatible import OpenAICompatibleProvider'
              ;;
            manga)
              .extra-venv/bin/python -I -c 'from linguaspindle.adapters.manga_image_translator import MangaImageTranslatorHttpAdapter'
              ;;
            runtime)
              .extra-venv/bin/python -I -c 'import linguaspindle.runtime'
              ;;
            cli)
              .extra-venv/bin/python -I -m linguaspindle.interfaces.cli --version
              ;;
            server)
              .extra-venv/bin/python -I -c 'from linguaspindle.interfaces.api import create_app; paths = {route.path for route in create_app(start_worker=False).routes}; assert "/" in paths and "/app.js" not in paths and "/styles.css" not in paths'
              ;;
            all)
              .extra-venv/bin/python -I -c 'import linguaspindle.runtime; from linguaspindle.interfaces.api import create_app; from linguaspindle.interfaces.cli import app'
              ;;
          esac
